name: Immersive Railroading Build Pipeline

on:
  push:
    branches:
      - 'master'
      - 'fixedNullPointer'
      - 'testbuild'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch: [1.7.10-forge,
                 1.10.2-forge,
                 1.11.2-forge,
                 1.12.2-forge,
                 1.14.4-forge,
                 1.15.2-forge,
                 1.16.5-forge,
                 1.17.1-forge,
                 1.18.2-forge,
                 1.19.4-forge,
                 1.20.1-forge,
                 1.21.1-neoforge]
    steps:
    - name: checkout repository
      uses: actions/checkout@v5

    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: keyscan
      run: mkdir -p ~/.ssh/ && ssh-keyscan -t rsa teamopenindustry.cc >> ~/.ssh/known_hosts

    - name: Install deps
      run: sudo apt install -y pngquant findutils xvfb

    - name: Download LuaJ 3.0.2 JAR
      run: |
        mkdir -p libs
        curl -L -o libs/luaj-jse-3.0.2.jar https://github.com/luaj/luaj/releases/download/v3.0.2/luaj-jse-3.0.2.jar

    - name: Setup Universal Mod Core (and helpers)
      env:
        BRANCH: ${{ matrix.branch }}
      run: java -jar UMCSetup.jar ${BRANCH} https

    - name: Modify build.gradle to Include LuaJ and Merge JARs
      run: |
        echo "" >> build.gradle
        echo "repositories {" >> build.gradle
        echo "    flatDir { dirs 'libs' }" >> build.gradle
        echo "}" >> build.gradle
        echo "" >> build.gradle
        echo "dependencies {" >> build.gradle
        echo "    implementation fileTree(dir: 'libs', include: ['*.jar'])" >> build.gradle
        echo "}" >> build.gradle
        echo "" >> build.gradle
        echo "jar {" >> build.gradle
        echo "    duplicatesStrategy = DuplicatesStrategy.EXCLUDE" >> build.gradle
        echo "    from {" >> build.gradle
        echo "        fileTree(dir: 'libs', include: ['*.jar']).collect { zipTree(it) }" >> build.gradle
        echo "    }" >> build.gradle
        echo "}" >> build.gradle

    - name: Gradle compile
      run: ./gradlew classes

    - name: Process images
      run: find src/main/resources/assets/immersiverailroading/ | grep png | xargs -I foo pngquant -s1 -f --ext .png foo

    - name: Gradle build
      run: ./gradlew build

    # - name: Gradle publish
    #  env:
    #    MAVENCI_PASS: ${{ secrets.MAVENCI_PASS }}
    #  run: ./gradlew publish
    # - uses: actions/upload-artifact@v6
    #  with:
    #    name: Immersive Railroading ${{matrix.branch}}
    #    path: build/libs/ImmersiveRailroading-${{matrix.branch}}-*

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Testbuild v${{ github.run_number }}
        draft: false
        prerelease: false
        files: build/libs/*.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    #- name: Gradle publish
    #  env:
    #    MAVENCI_PASS: ${{ secrets.MAVENCI_PASS }}
    #  run: ./gradlew publish
